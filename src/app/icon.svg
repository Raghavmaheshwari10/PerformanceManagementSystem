    <ellipse cx="0" cy="-5.5" rx="3.2" ry="5.8" fill="#4eca7a" transform="rotate(90)" opacity="0.9"/>
    <ellipse cx="0" cy="-5.5" rx="3.2" ry="5.8" fill="#2e8b57" transform="rotate(135)" opacity="0.9"/>
    <ellipse cx="0" cy="-5.5" rx="3.2" ry="5.8" fill="#3cb371" transform="rotate(180)" opacity="0.9"/>
    <ellipse cx="0" cy="-5.5" rx="3.2" ry="5.8" fill="#2e8b57" transform="rotate(225)" opacity="0.9"/>
